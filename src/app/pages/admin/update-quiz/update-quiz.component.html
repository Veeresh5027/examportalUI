<mat-card>
  <h1>Update Quiz</h1>
  <div class="container">
    <div class="row">
      <div class="col-md-8 offset-md-2">
        <form *ngIf="quiz" (ngSubmit)="updateQuiz()">
          <!-- Title -->
          <mat-form-field appearance="outline" class="w100">
            <mat-label>Enter Title</mat-label>
            <input [(ngModel)]="quiz.title" type="text" name="title" matInput placeholder="Enter Title" />
          </mat-form-field>

          <!-- Description -->
          <mat-form-field appearance="outline" class="w100">
            <mat-label>Enter Description</mat-label>
            <textarea [(ngModel)]="quiz.description" name="description" matInput placeholder="Enter Description" rows="5"></textarea>
          </mat-form-field>

          <!-- Max Marks and Number of Questions -->
          <div class="row">
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w100">
                <mat-label>Enter Max Marks</mat-label>
                <input [(ngModel)]="quiz.maxMarks" type="number" name="maxMarks" matInput placeholder="Enter Max Marks" />
              </mat-form-field>
            </div>
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w100">
                <mat-label>Enter No of Questions</mat-label>
                <input [(ngModel)]="quiz.numberOfQuestions" type="number" name="numberOfQuestions" matInput placeholder="Enter No of Questions" />
              </mat-form-field>
            </div>
          </div>

          <!-- Active Toggle and Category Dropdown -->
          <div class="row mt-3">
            <div class="col-md-6 col-12 d-flex align-items-center">
              <mat-slide-toggle [(ngModel)]="quiz.active" name="active" color="primary">
                Publish
              </mat-slide-toggle>
            </div>
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w100">
                <mat-label>Select Category</mat-label>
                <mat-select [(ngModel)]="quiz.category" [compareWith]="compareCategory" name="category">
                  <mat-option *ngFor="let c of categories" [value]="c">
                    {{ c.title }}
                  </mat-option>
                </mat-select>
              </mat-form-field>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="container text-center mt-4 mb-3">
            <button mat-raised-button color="primary" type="submit">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</mat-card>
