<mat-card>
    <h1>Add New Quiz</h1>
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <form (ngSubmit)="addQuiz()">
                    <mat-form-field appearance="outline" class="w100">
                        <mat-label>Enter Title</mat-label>
                        <input
                        [(ngModel)]="quizData.title"
                        type="text" name="title" matInput placeholder="Enter Title" />
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="w100">
                        <mat-label>Enter Description</mat-label>
                        <textarea
                        [(ngModel)]="quizData.description"
                        type="text"
                        name="description" matInput placeholder="Enter Description" rows="5"></textarea>
                    </mat-form-field>

                    <div class="row">
                        <div class="col-md-6 col-12">
                            <mat-form-field appearance="outline" class="w100">
                                <mat-label>Enter Max Marks</mat-label>
                                <input
                                [(ngModel)]="quizData.maxMarks"
                                type="number" name="maxMarks" matInput placeholder="Enter Max Marks" />
                            </mat-form-field>
                        </div>
                        <div class="col-md-6 col-12">
                            <mat-form-field appearance="outline" class="w100">
                                <mat-label>Enter No of Questions</mat-label>
                                <input
                                [(ngModel)]="quizData.numberOfQuestions"
                                type="number" name="numberOfQuestions" matInput
                                    placeholder="Enter No of Questions" />
                            </mat-form-field>
                        </div>
                    </div>

                    <div class="row mt-3"> <div class="col-md-6 col-12 d-flex align-items-center">
                            <mat-slide-toggle
                            [checked]="quizData.active"
                            [(ngModel)]="quizData.active"
                            name="active" color="primary">Publish</mat-slide-toggle>
                        </div>
                        <div class="col-md-6 col-12">
                            <mat-form-field appearance="outline" class="w100">
                                <mat-label>Select Category</mat-label>
                                <mat-select
                                [(ngModel)]="quizData.category.cid"
                                name="category">
                                    <mat-option *ngFor="let c of categories" [value]="c.cid">
                                        {{c.title}}
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                    </div>

                    <div class="container text-center mt-4 mb-3">
                        <button mat-raised-button color="primary" type="submit">Add</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</mat-card>
