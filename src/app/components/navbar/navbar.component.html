<mat-toolbar color="primary" class="my-navbar">
  <!-- Logo or Home Link -->
  <a [routerLink]="'/'" mat-icon-button class="example-icon" aria-label="Menu">
    <mat-icon>menu_book</mat-icon>
  </a>

  <span>Exam Portal</span>
  <span class="example-spacer"></span>

  <!-- Show Login/Register if not logged in -->
  <button
    *ngIf="!isLoggedIn"
    mat-button
    [routerLink]="'/login'"
    class="example-icon favorite-icon"
    aria-label="Login"
  >
    <mat-icon>login</mat-icon>
    <span>Login</span>
  </button>

  <button
    *ngIf="!isLoggedIn"
    mat-button
    [routerLink]="'/signup'"
    class="example-icon"
    aria-label="Register"
  >
    <mat-icon>app_registration</mat-icon>
    <span>Register</span>
  </button>

  <!-- Show username and logout if logged in -->
  <span *ngIf="isLoggedIn" class="example-icon" routerLink="admin/profile">
    {{ user?.username }}
  </span>

  <button
    *ngIf="isLoggedIn"
    mat-button
    class="example-icon"
    aria-label="Logout"
    (click)="logout()"
  >
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-toolbar>
